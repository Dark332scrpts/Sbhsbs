<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark332 hubs</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  padding: 10px;
}

h1 {
  text-align: center;
  color: red;
}

p {
  text-align: center;
  color: rgb(0,255,200);
}

textarea {
  width: 100%;
  height: 300px;
  background: #1a1a1a;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.link a {
  color: #00ff00;
  word-break: break-all;
}
</style>
</head>

<body>

<h1>Dark332 hubs</h1>
<p>By Dark332 [version 3.0]</p>

<textarea id="code" placeholder="Cole seu HTML + CSS + JS completo"></textarea>

<button id="btnGerar">Gerar Link</button>
<button id="btnLimpar">Limpar</button>

<div class="link" id="link"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://elosgasf4477.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("btnGerar").addEventListener("click", async () => {
  const code = document.getElementById("code").value;

  if (!code) return alert("Cola o código!");

  const id = Math.random().toString(36).substring(2, 8);

  try {
    await set(ref(db, "sites/" + id), { code: code });

    const base = location.origin + location.pathname.replace("index.html", "");
    const url = base + "view.html?id=" + id;

    document.getElementById("link").innerHTML =
      `<p style="margin-top:15px">Link gerado:<br><a href="${url}" target="_blank">${url}</a></p>`;

  } catch(e) {
    alert("Erro ao salvar: " + e.message);
  }
});

document.getElementById("btnLimpar").addEventListener("click", () => {
  document.getElementById("code").value = "";
  document.getElementById("link").innerHTML = "";
});
</script>

</body>
</html>
