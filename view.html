<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Eruda carrega antes de tudo -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
  eruda.init();

  // Protege contra document.write destruir o Eruda
  const _origWrite = document.write.bind(document);
  document.write = function(...args) {
    _origWrite(...args);
    setTimeout(() => {
      if (!document.getElementById('eruda')) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = () => eruda.init();
        document.documentElement.appendChild(s);
      }
    }, 300);
  };

  // Bloqueia remoção do Eruda via JS
  const _origRemove = Element.prototype.remove;
  Element.prototype.remove = function () {
    if (this.id === 'eruda') return;
    return _origRemove.apply(this, arguments);
  };

  const _origRemoveChild = Node.prototype.removeChild;
  Node.prototype.removeChild = function (child) {
    if (child && child.id === 'eruda') return child;
    return _origRemoveChild.apply(this, arguments);
  };

  // Keepalive — reinjecta se sumir
  setInterval(() => {
    if (!document.getElementById('eruda')) {
      try { eruda.init(); } catch(e) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = () => eruda.init();
        document.documentElement.appendChild(s);
      }
    }
  }, 2000);
</script>

  opacity: 1 !important;
}
</style>
</head>
